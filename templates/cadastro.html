<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Kure Recicla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>:root { --primary: #3C1276; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <img src="static/Kure_Recicla.png" alt="Logo" class="h-12 mx-auto mb-4">
            <h2 class="text-2xl font-bold text-gray-800">Crie sua conta</h2>
        </div>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                <input type="text" id="nome" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#3C1276] outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#3C1276] outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">E-mail</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#3C1276] outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Celular (WhatsApp)</label>
                <input type="tel" id="telefone" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#3C1276] outline-none">
            </div>
            <div>
                <div class="flex items-center justify-between gap-4">
                    <label class="block text-sm font-medium text-gray-700">Criar Senha</label>
                    <button type="button" id="toggleRegisterPassword" class="text-sm font-bold text-[#3C1276] hover:underline" aria-label="Mostrar/ocultar senha">👁️</button>
                </div>
                <input type="password" id="senha" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[#3C1276] outline-none mt-2">
            </div>
            <button type="submit" class="w-full bg-[#3C1276] text-white py-3 rounded-lg font-bold hover:opacity-90 transition">Cadastrar</button>
        </form>
        
<p class="mt-6 text-center text-gray-600">
            Já tem uma conta? <a href="/" class="text-[#3C1276] font-bold hover:underline">Faça login</a>
        </p>
    </div>

    <script>
        // Toggle de visibilidade da senha (Cadastro)
        const toggleRegisterBtn = document.getElementById('toggleRegisterPassword');
        const registerPasswordInput = document.getElementById('senha');
        if (toggleRegisterBtn && registerPasswordInput) {
            toggleRegisterBtn.addEventListener('click', () => {
                const isPassword = registerPasswordInput.type === 'password';
                registerPasswordInput.type = isPassword ? 'text' : 'password';
                toggleRegisterBtn.textContent = isPassword ? '🙈' : '👁️';
            });
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                senha: document.getElementById('senha').value
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('Cadastro realizado! Agora faça seu login.');
                    window.location.href = 'index.html'; // Voltará e o usuário abre o modal
                } else {
                    const err = await response.json();
                    alert('Erro: ' + err.error);
                }
            } catch (error) {
                alert('Erro de conexão ao servidor.');
            }
        });
    </script>
</body>
</html>
